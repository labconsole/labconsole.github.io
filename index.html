<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skyline Labs — Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0D1113;
    --panel:#1A2124;
    --panel-hi:#212a2d;
    --paper:#ECE7DA;
    --paper-dim:rgba(236,231,218,0.55);
    --line:rgba(236,231,218,0.12);
    --amber:#D9A441;
    --amber-dim:rgba(217,164,65,0.55);
    --teal:#4FA3A0;
    --danger:#C4573A;
    --radius:2px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--ink); color:var(--paper);
    font-family:'Inter',sans-serif;
    min-height:100vh;
  }
  .mono{font-family:'IBM Plex Mono',monospace;}

  /* ===== Login screen ===== */
  #loginScreen{
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:0; padding:24px;
  }
  .login-box{
    width:100%; max-width:380px; background:var(--panel);
    border:1px solid var(--line); border-radius:var(--radius);
    padding:36px 32px;
  }
  .login-eyebrow{
    font-family:'IBM Plex Mono',monospace; font-size:0.72rem; letter-spacing:0.14em;
    text-transform:uppercase; color:var(--amber); margin-bottom:8px;
  }
  .login-title{
    font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:1.4rem;
    margin-bottom:28px;
  }
  .field-label{
    display:block; font-family:'IBM Plex Mono',monospace; font-size:0.72rem;
    letter-spacing:0.08em; text-transform:uppercase; color:var(--paper-dim);
    margin-bottom:8px;
  }
  .field-input{
    width:100%; background:var(--ink); border:1px solid var(--line);
    color:var(--paper); border-radius:var(--radius); padding:12px 14px;
    font-family:'Inter',sans-serif; font-size:0.94rem; margin-bottom:18px;
    outline:none; transition:border-color 0.15s;
  }
  .field-input:focus{border-color:var(--amber);}
  .login-btn{
    width:100%; background:var(--amber); color:var(--ink); border:none;
    border-radius:var(--radius); padding:13px; font-family:'IBM Plex Mono',monospace;
    font-size:0.86rem; font-weight:600; letter-spacing:0.04em; cursor:pointer;
    transition:background 0.15s;
  }
  .login-btn:hover{background:#e5b458;}
  .login-err{
    color:var(--danger); font-family:'IBM Plex Mono',monospace; font-size:0.78rem;
    margin-top:14px; display:none;
  }

  /* ===== Console shell ===== */
  #console{display:none; min-height:100vh; flex-direction:column;}
  header{
    border-bottom:1px solid var(--line); padding:18px 32px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .brand{display:flex; align-items:center; gap:10px;}
  .brand-dot{width:8px; height:8px; border-radius:50%; background:var(--teal); box-shadow:0 0 8px var(--teal);}
  .brand-name{font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:1.02rem;}
  .brand-sub{font-family:'IBM Plex Mono',monospace; font-size:0.7rem; color:var(--paper-dim);}
  .logout-btn{
    background:none; border:1px solid var(--line); color:var(--paper-dim);
    font-family:'IBM Plex Mono',monospace; font-size:0.74rem; padding:8px 14px;
    border-radius:var(--radius); cursor:pointer; transition:all 0.15s;
  }
  .logout-btn:hover{border-color:var(--danger); color:var(--danger);}
  .tab-btn.active{border-color:var(--amber); color:var(--amber);}
  .tab-btn.active:hover{border-color:var(--amber); color:var(--amber);}

  .layout{flex:1; display:flex; min-height:0;}

  /* ===== Queue (left list) ===== */
  .queue{
    width:380px; flex-shrink:0; border-right:1px solid var(--line);
    overflow-y:auto; max-height:calc(100vh - 61px);
  }
  .queue-head{
    padding:16px 20px 12px; font-family:'IBM Plex Mono',monospace;
    font-size:0.7rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--paper-dim);
    display:flex; justify-content:space-between;
  }
  .entry{
    padding:16px 20px; border-bottom:1px solid var(--line); cursor:pointer;
    transition:background 0.12s; position:relative;
  }
  .entry:hover{background:var(--panel);}
  .entry.active{background:var(--panel-hi);}
  .entry.active::before{
    content:''; position:absolute; left:0; top:0; bottom:0; width:2px; background:var(--amber);
  }
  .entry-top{display:flex; align-items:center; gap:8px; margin-bottom:6px;}
  .status-dot{width:6px; height:6px; border-radius:50%; flex-shrink:0;}
  .status-dot.pending{background:var(--amber); box-shadow:0 0 6px var(--amber);}
  .status-dot.replied{background:var(--teal);}
  .entry-name{font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:0.92rem;}
  .entry-time{
    margin-left:auto; font-family:'IBM Plex Mono',monospace; font-size:0.68rem; color:var(--paper-dim);
  }
  .entry-preview{
    font-size:0.82rem; color:var(--paper-dim); line-height:1.4;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .entry-tag{
    display:inline-block; margin-top:8px; font-family:'IBM Plex Mono',monospace;
    font-size:0.66rem; letter-spacing:0.06em; text-transform:uppercase;
    color:var(--amber-dim); border:1px solid rgba(217,164,65,0.3);
    padding:2px 8px; border-radius:var(--radius);
  }

  /* ===== Detail pane ===== */
  .detail{flex:1; overflow-y:auto; max-height:calc(100vh - 61px);}
  .detail-inner{max-width:640px; margin:0 auto; padding:40px 32px;}
  .detail-empty{
    height:100%; display:flex; align-items:center; justify-content:center;
    color:var(--paper-dim); font-family:'IBM Plex Mono',monospace; font-size:0.86rem;
  }
  .detail-header{margin-bottom:28px; padding-bottom:24px; border-bottom:1px solid var(--line);}
  .detail-name{font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:1.6rem; margin-bottom:10px;}
  .detail-meta{display:flex; flex-wrap:wrap; gap:20px; font-family:'IBM Plex Mono',monospace; font-size:0.78rem; color:var(--paper-dim);}
  .detail-meta a{color:var(--teal); text-decoration:none;}
  .detail-badge{
    display:inline-block; margin-top:14px; font-family:'IBM Plex Mono',monospace;
    font-size:0.72rem; color:var(--ink); background:var(--amber);
    padding:4px 12px; border-radius:var(--radius); font-weight:600;
  }
  .detail-label{
    font-family:'IBM Plex Mono',monospace; font-size:0.7rem; letter-spacing:0.1em;
    text-transform:uppercase; color:var(--paper-dim); margin-bottom:10px;
  }
  .detail-message{
    background:var(--panel); border-left:2px solid var(--teal); border-radius:var(--radius);
    padding:18px 20px; font-size:0.95rem; line-height:1.65; margin-bottom:32px; white-space:pre-wrap;
  }
  .reply-box{
    width:100%; min-height:140px; background:var(--panel); border:1px solid var(--line);
    color:var(--paper); border-radius:var(--radius); padding:16px; font-family:'Inter',sans-serif;
    font-size:0.94rem; resize:vertical; outline:none; margin-bottom:14px;
  }
  .reply-box:focus{border-color:var(--amber);}
  .reply-row{display:flex; align-items:center; gap:14px;}
  .send-btn{
    background:var(--amber); color:var(--ink); border:none; border-radius:var(--radius);
    padding:12px 24px; font-family:'IBM Plex Mono',monospace; font-size:0.84rem; font-weight:600;
    cursor:pointer; transition:background 0.15s;
  }
  .send-btn:hover{background:#e5b458;}
  .reply-status{font-family:'IBM Plex Mono',monospace; font-size:0.78rem; color:var(--teal);}
  .already-replied{
    background:rgba(79,163,160,0.1); border:1px solid rgba(79,163,160,0.3); border-radius:var(--radius);
    padding:18px 20px; font-size:0.9rem; line-height:1.6; white-space:pre-wrap;
  }
  .already-replied-label{
    font-family:'IBM Plex Mono',monospace; font-size:0.7rem; letter-spacing:0.1em;
    text-transform:uppercase; color:var(--teal); margin-bottom:10px;
  }

  @media (max-width: 760px){
    .layout{flex-direction:column;}
    .queue{width:100%; border-right:none; border-bottom:1px solid var(--line); max-height:40vh;}
    .detail{max-height:none;}
  }
</style>
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div id="loginScreen">
    <div class="login-box">
      <div class="login-eyebrow mono">// Skyline Labs</div>
      <div class="login-title">Console access</div>
      <label class="field-label">Email</label>
      <input type="email" class="field-input" id="loginEmail" placeholder="you@gmail.com">
      <label class="field-label">Password</label>
      <input type="password" class="field-input" id="loginPassword" placeholder="••••••••">
      <button class="login-btn" onclick="mockLogin()">Sign in</button>
      <div class="login-err mono" id="loginErr">Invalid credentials. Try again.</div>
    </div>
  </div>

  <!-- CONSOLE -->
  <div id="console">
    <header>
      <div class="brand">
        <div class="brand-dot"></div>
        <div>
          <div class="brand-name">Skyline Labs</div>
          <div class="brand-sub" id="headerSub">Message console</div>
        </div>
      </div>
      <div style="display:flex; align-items:center; gap:10px;">
        <button class="logout-btn mono tab-btn active" id="tabInboxBtn" onclick="switchTab('inbox')">Inbox</button>
        <button class="logout-btn mono tab-btn" id="tabReferrersBtn" onclick="switchTab('referrers')">Referrers</button>
        <button class="logout-btn mono" onclick="logOut()">Log out</button>
      </div>
    </header>

    <div class="layout" id="inboxLayout">
      <div class="queue" id="queue"></div>
      <div class="detail" id="detail">
        <div class="detail-empty mono">Select a message to view</div>
      </div>
    </div>

    <div class="layout" id="referrersLayout" style="display:none;">
      <div class="queue" id="refQueue"></div>
      <div class="detail" id="refDetail">
        <div class="detail-empty mono">Select a referrer to view</div>
      </div>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>
  // ===== Supabase config =====
  const SUPABASE_URL = "https://ufksaccekypuohdosukm.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVma3NhY2Nla3lwdW9oZG9zdWttIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxMTc1OTQsImV4cCI6MjA5OTY5MzU5NH0.0vZJWUIFdnUlrCVT3QQDI9nZ7ETHvQzZgET956909ic";
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // ===== EmailJS config (for sending replies) — fill in your REPLY template ID =====
  const EMAILJS_PUBLIC_KEY   = "dSBabtifSQ3USQXrb";
  const EMAILJS_SERVICE_ID   = "service_uek07mm";
  const EMAILJS_REPLY_TEMPLATE_ID = "YOUR_REPLY_TEMPLATE_ID"; // separate template, see instructions below
  emailjs.init(EMAILJS_PUBLIC_KEY);

  let messages = [];
  let activeId = null;

  async function mockLogin(){
    const email = document.getElementById('loginEmail').value.trim();
    const pw = document.getElementById('loginPassword').value.trim();
    const errBox = document.getElementById('loginErr');
    errBox.style.display = 'none';

    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password: pw });
    if (error) {
      errBox.textContent = error.message;
      errBox.style.display = 'block';
      return;
    }

    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('console').style.display = 'flex';
    await loadMessages();
  }

  // If already logged in (session persisted), skip straight to console
  (async () => {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (session) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('console').style.display = 'flex';
      await loadMessages();
    }
  })();

  async function loadMessages(){
    const { data, error } = await supabaseClient
      .from('messages')
      .select('*')
      .order('created_at', { ascending: false });
    if (error) {
      console.error('Load error:', error);
      return;
    }
    messages = data;
    renderQueue();
  }

  async function logOut(){
    await supabaseClient.auth.signOut();
    location.reload();
  }

  function switchTab(tab){
    document.getElementById('tabInboxBtn').classList.toggle('active', tab === 'inbox');
    document.getElementById('tabReferrersBtn').classList.toggle('active', tab === 'referrers');
    document.getElementById('inboxLayout').style.display = tab === 'inbox' ? 'flex' : 'none';
    document.getElementById('referrersLayout').style.display = tab === 'referrers' ? 'flex' : 'none';
    document.getElementById('headerSub').textContent = tab === 'inbox' ? 'Message console' : 'Referral payouts';
    if (tab === 'referrers') loadReferrers();
  }

  let referrers = [];
  let activeRefId = null;

  async function loadReferrers(){
    const { data: refData, error: refErr } = await supabaseClient.from('referrers').select('*');
    if (refErr){ console.error(refErr); return; }

    const { data: msgData, error: msgErr } = await supabaseClient.from('messages').select('*').not('referrer_id', 'is', null);
    if (msgErr){ console.error(msgErr); return; }

    referrers = refData.map(r => {
      const refs = msgData.filter(m => m.referrer_id === r.id);
      const pending = refs.reduce((s, m) => s + (!m.commission_paid ? Number(m.commission_amount || 0) : 0), 0);
      const paid = refs.reduce((s, m) => s + (m.commission_paid ? Number(m.commission_amount || 0) : 0), 0);
      return { ...r, refs, pending, paid };
    }).sort((a,b) => b.pending - a.pending);

    renderRefQueue();
  }

  function renderRefQueue(){
    const q = document.getElementById('refQueue');
    const totalPending = referrers.reduce((s,r)=> s + r.pending, 0);
    q.innerHTML = `<div class="queue-head"><span>Referrers</span><span>₹${totalPending.toLocaleString('en-IN')} pending</span></div>` +
      referrers.map(r => `
        <div class="entry ${r.id === activeRefId ? 'active' : ''}" onclick="openReferrer('${r.id}')">
          <div class="entry-top">
            <div class="status-dot ${r.pending > 0 ? 'pending' : 'replied'}"></div>
            <div class="entry-name">${r.name}</div>
          </div>
          <div class="entry-preview">${r.refs.length} referral${r.refs.length === 1 ? '' : 's'}</div>
          ${r.pending > 0 ? `<span class="entry-tag" style="color:var(--amber-dim); border-color:rgba(217,164,65,0.3);">₹${r.pending.toLocaleString('en-IN')} pending</span>` : `<span class="entry-tag" style="color:var(--teal); border-color:rgba(79,163,160,0.3);">All paid</span>`}
        </div>
      `).join('') || `<div class="detail-empty mono" style="height:auto; padding:40px 20px;">No referrers yet</div>`;
  }

  async function openReferrer(id){
    activeRefId = id;
    renderRefQueue();
    const r = referrers.find(x => x.id === id);
    const d = document.getElementById('refDetail');

    const refRows = r.refs.length === 0
      ? `<div class="empty-state" style="text-align:center; padding:30px; color:var(--paper-dim); font-family:'IBM Plex Mono',monospace; font-size:0.84rem;">No referrals yet</div>`
      : r.refs.map(m => `
        <div class="ref-row" style="background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:14px 16px; margin-bottom:10px; display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;">
          <div>
            <div style="font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:0.9rem;">${m.from_name}</div>
            <div style="font-family:'IBM Plex Mono',monospace; font-size:0.7rem; color:var(--paper-dim);">${new Date(m.created_at).toLocaleDateString('en-IN',{day:'numeric',month:'short'})} · ${m.project_type || ''}</div>
          </div>
          <div style="display:flex; align-items:center; gap:12px;">
            <span style="font-family:'IBM Plex Mono',monospace; font-size:0.85rem; font-weight:600;">₹${Number(m.commission_amount || 0).toLocaleString('en-IN')}</span>
            ${m.commission_paid
              ? `<span class="ref-status earned mono" style="font-size:0.68rem; padding:3px 10px; border-radius:2px; color:var(--teal); border:1px solid rgba(79,163,160,0.3);">Paid</span>`
              : `<button class="send-btn" style="padding:8px 14px; font-size:0.72rem;" onclick="payFromReferrerView('${m.id}','${r.id}')">Mark paid</button>`
            }
          </div>
        </div>
      `).join('');

    d.innerHTML = `
      <div class="detail-inner">
        <div class="detail-header">
          <div class="detail-name">${r.name}</div>
          <div class="detail-meta"><span>${r.refs.length} referral${r.refs.length === 1 ? '' : 's'}</span></div>
        </div>
        <div class="stats-row" style="display:grid; grid-template-columns:repeat(2,1fr); gap:14px; margin-bottom:32px;">
          <div style="background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:18px;">
            <div class="detail-label mono" style="margin-bottom:6px;">Pending payout</div>
            <div style="font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:1.5rem; color:var(--amber);">₹${r.pending.toLocaleString('en-IN')}</div>
          </div>
          <div style="background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:18px;">
            <div class="detail-label mono" style="margin-bottom:6px;">Already paid</div>
            <div style="font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:1.5rem; color:var(--teal);">₹${r.paid.toLocaleString('en-IN')}</div>
          </div>
        </div>
        <div class="detail-label mono">Referred clients</div>
        ${refRows}
        ${r.pending > 0 ? `
          <div style="margin-top:20px;">
            <button class="send-btn" onclick="payAllPending('${r.id}')">Mark all pending as paid (₹${r.pending.toLocaleString('en-IN')}) →</button>
          </div>
        ` : ''}
      </div>
    `;
  }

  async function payFromReferrerView(messageId, referrerId){
    const { error } = await supabaseClient.from('messages').update({ commission_paid: true }).eq('id', messageId);
    if (error){ console.error(error); return; }
    await loadReferrers();
    openReferrer(referrerId);
  }

  async function payAllPending(referrerId){
    const r = referrers.find(x => x.id === referrerId);
    const unpaidIds = r.refs.filter(m => !m.commission_paid).map(m => m.id);
    const { error } = await supabaseClient.from('messages').update({ commission_paid: true }).in('id', unpaidIds);
    if (error){ console.error(error); return; }
    await loadReferrers();
    openReferrer(referrerId);
  }
</script>
<script>

  function timeAgo(iso){
    const d = new Date(iso);
    return d.toLocaleDateString('en-IN', {day:'numeric', month:'short'}) + ' · ' + d.toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit'});
  }

  function renderQueue(){
    const q = document.getElementById('queue');
    const pending = messages.filter(m => !m.replied).length;
    q.innerHTML = `<div class="queue-head"><span>Inbox</span><span>${pending} pending</span></div>` +
      messages.slice().sort((a,b)=> new Date(b.created_at) - new Date(a.created_at)).map(m => `
        <div class="entry ${m.id === activeId ? 'active' : ''}" onclick="openMessage('${m.id}')">
          <div class="entry-top">
            <div class="status-dot ${m.replied ? 'replied' : 'pending'}"></div>
            <div class="entry-name">${m.from_name}</div>
            <div class="entry-time mono">${timeAgo(m.created_at)}</div>
          </div>
          <div class="entry-preview">${m.message}</div>
          <span class="entry-tag">${m.project_type}</span>
        </div>
      `).join('');
  }

  function openMessage(id){
    activeId = id;
    renderQueue();
    const m = messages.find(x => x.id === id);
    const d = document.getElementById('detail');

    const replySection = m.replied ? `
      <div class="already-replied-label mono">✓ Reply sent</div>
      <div class="already-replied">${m.reply_text}</div>
    ` : `
      <div class="detail-label mono">Send reply</div>
      <textarea class="reply-box" id="replyInput" placeholder="Type your reply..."></textarea>

      <label style="display:flex; align-items:center; gap:8px; margin-bottom:14px; font-family:'IBM Plex Mono',monospace; font-size:0.8rem; color:var(--paper-dim); cursor:pointer;">
        <input type="checkbox" id="paymentToggle" onchange="document.getElementById('paymentAmountRow').style.display = this.checked ? 'flex' : 'none'">
        Include payment request
      </label>
      <div id="paymentAmountRow" style="display:none; flex-direction:column; gap:10px; margin-bottom:14px;">
        <input type="number" id="totalAmount" class="field-input" placeholder="Total project amount (₹)" style="margin-bottom:0;">
        <input type="number" id="paymentAmount" class="field-input" placeholder="Advance to collect now (₹)" style="margin-bottom:0;">
      </div>

      <div class="reply-row">
        <button class="send-btn" id="sendBtn" onclick="sendReply('${m.id}')">Send reply →</button>
        <span class="reply-status mono" id="replyStatus"></span>
      </div>
    `;

    d.innerHTML = `
      <div class="detail-inner">
        <div class="detail-header">
          <div class="detail-name">${m.from_name}</div>
          <div class="detail-meta">
            <span>📞 ${m.phone}</span>
            <a href="mailto:${m.reply_to}">✉ ${m.reply_to}</a>
            <span>${timeAgo(m.created_at)}</span>
          </div>
          <div class="detail-badge">${m.project_type}</div>
        </div>
        <div class="detail-label mono">Requirement</div>
        <div class="detail-message">${m.message}</div>
        ${replySection}

        <div style="margin-top:32px; padding-top:24px; border-top:1px solid var(--line);">
          <div class="detail-label mono">Request advance payment</div>
          <p style="font-size:0.82rem; color:var(--paper-dim); margin-bottom:14px;">Send an advance payment request any time — before or after your first reply.</p>
          <input type="number" id="advanceTotalAmount" class="field-input" placeholder="Total project cost (₹, optional)" value="${m.total_amount || ''}" style="margin-bottom:10px;">
          <input type="number" id="advanceAmountStandalone" class="field-input" placeholder="Advance amount to collect (₹)" value="${m.advance_requested || ''}" style="margin-bottom:14px;">
          <div class="reply-row">
            <button class="send-btn" id="advanceSendBtn" onclick="sendAdvanceRequest('${m.id}')">Send advance request →</button>
            <span class="reply-status mono" id="advanceStatus"></span>
          </div>
        </div>

        ${m.advance_requested ? `
        <div style="margin-top:32px; padding-top:24px; border-top:1px solid var(--line);">
          <div class="detail-label mono">Verify advance received</div>
          <p style="font-size:0.82rem; color:var(--paper-dim); margin-bottom:14px;">
            You requested ₹${Number(m.advance_requested).toLocaleString('en-IN')}. Confirm how much actually landed in your account — this may be less if the client sent a partial amount.
          </p>
          ${m.advance_verified ? `
            <div class="already-replied" style="margin-bottom:0;">✓ Verified received: ₹${Number(m.advance_received).toLocaleString('en-IN')}</div>
          ` : `
            <input type="number" id="advanceReceivedInput" class="field-input" placeholder="Amount actually received (₹)" value="${m.advance_requested}" style="margin-bottom:14px;">
            <div class="reply-row">
              <button class="send-btn" id="verifySendBtn" onclick="verifyAdvanceReceived('${m.id}')">Confirm received amount →</button>
              <span class="reply-status mono" id="verifyStatus"></span>
            </div>
          `}
        </div>
        ` : ''}

        ${m.advance_verified && m.total_amount ? `
        <div style="margin-top:32px; padding-top:24px; border-top:1px solid var(--line);">
          <div class="detail-label mono">Project complete — remaining payment</div>
          <p style="font-size:0.82rem; color:var(--paper-dim); margin-bottom:14px;">
            Total ₹${Number(m.total_amount).toLocaleString('en-IN')} − Received ₹${Number(m.advance_received).toLocaleString('en-IN')} =
            <strong style="color:var(--teal);">₹${(Number(m.total_amount) - Number(m.advance_received)).toLocaleString('en-IN')} remaining</strong>
          </p>
          ${m.final_payment_sent ? `
            ${m.final_verified ? `
              <div class="already-replied" style="margin-bottom:0;">✓ Verified received: ₹${Number(m.final_received).toLocaleString('en-IN')}</div>
            ` : `
              <p style="font-size:0.82rem; color:var(--paper-dim); margin-bottom:10px;">Confirm how much actually landed in your account for the remaining payment.</p>
              <input type="number" id="finalReceivedInput" class="field-input" placeholder="Amount actually received (₹)" value="${(Number(m.total_amount) - Number(m.advance_received)).toFixed(0)}" style="margin-bottom:14px;">
              <div class="reply-row">
                <button class="send-btn" id="verifyFinalBtn" onclick="verifyFinalReceived('${m.id}')">Confirm received amount →</button>
                <span class="reply-status mono" id="verifyFinalStatus"></span>
              </div>
            `}
          ` : `
            <div class="reply-row">
              <button class="send-btn" id="paymentSendBtn" onclick="sendPaymentRequest('${m.id}')">Send remaining payment request →</button>
              <span class="reply-status mono" id="paymentStatus"></span>
            </div>
          `}
        </div>
        ` : ''}

        ${m.referrer_id ? `
        <div style="margin-top:32px; padding-top:24px; border-top:1px solid var(--line);">
          <div class="detail-label mono">Referral commission</div>
          <p style="font-size:0.82rem; color:var(--paper-dim); margin-bottom:10px;">
            This client came through a referral. 2% of everything actually received so far: <strong style="color:var(--amber);">₹${Number(m.commission_amount || 0).toLocaleString('en-IN')}</strong>
          </p>
          ${m.commission_paid ? `
            <div class="already-replied" style="margin-bottom:0;">✓ Commission paid out to referrer</div>
          ` : `
            <button class="send-btn" onclick="markCommissionPaid('${m.id}')">Mark commission as paid</button>
          `}
        </div>
        ` : ''}
      </div>
    `;
  }

  async function markCommissionPaid(id){
    const m = messages.find(x => x.id === id);
    const { error } = await supabaseClient
      .from('messages')
      .update({ commission_paid: true })
      .eq('id', id);
    if (error){ console.error(error); return; }
    m.commission_paid = true;
    openMessage(id);
  }

  // ===== Payment config =====
  const UPI_ID = "vikaskishanpur@oksbi";
  const PAYEE_NAME = "Skyline Lab";

  function buildPaymentSection(amount, total, label){
    if (!amount || isNaN(amount) || Number(amount) <= 0) return "";
    label = label || "Amount due";
    const note = `Skyline Lab — ${label}`;
    const upiLink = `upi://pay?pa=${encodeURIComponent(UPI_ID)}&pn=${encodeURIComponent(PAYEE_NAME)}&am=${encodeURIComponent(amount)}&cu=INR&tn=${encodeURIComponent(note)}`;
    const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=260x260&data=${encodeURIComponent(upiLink)}`;
    const totalRow = (total && !isNaN(total) && Number(total) > 0)
      ? `<p style="margin:0 0 2px; color:#64748b; font-size:13px;">Total project cost: <strong style="color:#0f172a;">₹${Number(total).toLocaleString('en-IN')}</strong></p>`
      : "";
    return `
      <div style="margin-top:24px; padding:20px; background:#f8fafc; border-radius:8px; text-align:center; font-family:Arial,sans-serif;">
        ${totalRow}
        <p style="margin:0 0 4px; color:#64748b; font-size:13px;">${label}</p>
        <p style="margin:0 0 16px; color:#0f172a; font-size:22px; font-weight:700;">₹${Number(amount).toLocaleString('en-IN')}</p>
        <img src="${qrUrl}" width="200" height="200" alt="UPI QR code" style="display:block; margin:0 auto 16px; border-radius:6px;">
        <a href="${upiLink}" style="display:inline-block; background:#38bdf8; color:#0f172a; text-decoration:none; font-weight:700; padding:12px 28px; border-radius:6px; font-size:14px;">Pay via UPI app →</a>
        <p style="margin:14px 0 0; color:#94a3b8; font-size:11px;">Scan the QR code, or tap the button on your phone to open GPay / PhonePe / Paytm.</p>
      </div>
    `;
  }

  async function sendReply(id){
    const textEl = document.getElementById('replyInput');
    const text = textEl.value.trim();
    if(!text) return;
    const m = messages.find(x => x.id === id);
    const statusEl = document.getElementById('replyStatus');
    const btn = document.getElementById('sendBtn');

    const paymentOn = document.getElementById('paymentToggle').checked;
    const advanceAmount = document.getElementById('paymentAmount').value;
    const totalAmount = document.getElementById('totalAmount').value;
    const paymentSection = paymentOn ? buildPaymentSection(advanceAmount, totalAmount, "Advance due now") : "";

    btn.disabled = true;
    btn.textContent = "Sending...";
    statusEl.textContent = "";

    try {
      // 1. Email the reply to the client
      await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_REPLY_TEMPLATE_ID, {
        to_email: m.reply_to,
        from_name: m.from_name,
        reply_text: text,
        payment_section: paymentSection
      });

      // 2. Mark as replied in Supabase
      const { error } = await supabaseClient
        .from('messages')
        .update({ replied: true, reply_text: text, replied_at: new Date().toISOString() })
        .eq('id', id);
      if (error) throw error;

      m.replied = true;
      m.reply_text = text;
      statusEl.textContent = 'Sent ✓';
      setTimeout(()=>{ openMessage(id); }, 500);
    } catch(err) {
      console.error('Reply error:', err);
      statusEl.textContent = 'Failed — try again';
      btn.disabled = false;
      btn.textContent = "Send reply →";
    }
  }

  async function sendAdvanceRequest(id){
    const m = messages.find(x => x.id === id);
    const total = document.getElementById('advanceTotalAmount').value;
    const advance = document.getElementById('advanceAmountStandalone').value;
    const statusEl = document.getElementById('advanceStatus');
    const btn = document.getElementById('advanceSendBtn');

    if (!advance || Number(advance) <= 0){
      statusEl.textContent = 'Enter an advance amount';
      return;
    }

    const paymentSection = buildPaymentSection(advance, total, "Advance payment due");

    btn.disabled = true;
    btn.textContent = "Sending...";
    statusEl.textContent = "";

    try {
      await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_REPLY_TEMPLATE_ID, {
        to_email: m.reply_to,
        from_name: m.from_name,
        reply_text: `Here's the advance payment request to get your project started.`,
        payment_section: paymentSection
      });

      const { error } = await supabaseClient
        .from('messages')
        .update({
          total_amount: total ? Number(total) : null,
          advance_requested: Number(advance),
          advance_verified: false
        })
        .eq('id', id);
      if (error) throw error;

      m.total_amount = total ? Number(total) : null;
      m.advance_requested = Number(advance);
      m.advance_verified = false;

      statusEl.textContent = 'Sent ✓';
      setTimeout(()=>{ openMessage(id); }, 500);
    } catch(err) {
      console.error('Advance request error:', err);
      statusEl.textContent = 'Failed — try again';
    } finally {
      btn.disabled = false;
      btn.textContent = "Send advance request →";
    }
  }

  async function verifyAdvanceReceived(id){
    const m = messages.find(x => x.id === id);
    const received = document.getElementById('advanceReceivedInput').value;
    const statusEl = document.getElementById('verifyStatus');
    const btn = document.getElementById('verifySendBtn');

    if (!received || Number(received) <= 0){
      statusEl.textContent = 'Enter the amount received';
      return;
    }

    btn.disabled = true;
    btn.textContent = "Saving...";

    try {
      const commissionAdd = m.referrer_id ? Number(received) * 0.02 : 0;
      const { error } = await supabaseClient
        .from('messages')
        .update({
          advance_received: Number(received),
          advance_verified: true,
          commission_amount: (Number(m.commission_amount) || 0) + commissionAdd
        })
        .eq('id', id);
      if (error) throw error;

      m.advance_received = Number(received);
      m.advance_verified = true;
      m.commission_amount = (Number(m.commission_amount) || 0) + commissionAdd;
      openMessage(id);
    } catch(err) {
      console.error('Verify error:', err);
      statusEl.textContent = 'Failed — try again';
      btn.disabled = false;
      btn.textContent = "Confirm received amount →";
    }
  }

  // Uses the total_amount and verified advance_received already stored against this message —
  // no manual re-entry needed, the remaining amount is calculated automatically.
  async function verifyFinalReceived(id){
    const m = messages.find(x => x.id === id);
    const received = document.getElementById('finalReceivedInput').value;
    const statusEl = document.getElementById('verifyFinalStatus');
    const btn = document.getElementById('verifyFinalBtn');

    if (!received || Number(received) <= 0){
      statusEl.textContent = 'Enter the amount received';
      return;
    }

    btn.disabled = true;
    btn.textContent = "Saving...";

    try {
      const commissionAdd = m.referrer_id ? Number(received) * 0.02 : 0;
      const { error } = await supabaseClient
        .from('messages')
        .update({
          final_received: Number(received),
          final_verified: true,
          commission_amount: (Number(m.commission_amount) || 0) + commissionAdd
        })
        .eq('id', id);
      if (error) throw error;

      m.final_received = Number(received);
      m.final_verified = true;
      m.commission_amount = (Number(m.commission_amount) || 0) + commissionAdd;
      openMessage(id);
    } catch(err) {
      console.error('Verify final error:', err);
      statusEl.textContent = 'Failed — try again';
      btn.disabled = false;
      btn.textContent = "Confirm received amount →";
    }
  }

  async function sendPaymentRequest(id){
    const m = messages.find(x => x.id === id);
    const total = Number(m.total_amount) || 0;
    const received = Number(m.advance_received) || 0;
    const remaining = total - received;
    const statusEl = document.getElementById('paymentStatus');
    const btn = document.getElementById('paymentSendBtn');

    if (remaining <= 0){
      statusEl.textContent = 'Nothing remaining to collect';
      return;
    }

    const paymentSection = buildPaymentSection(remaining, total, "Remaining payment due — project complete");

    btn.disabled = true;
    btn.textContent = "Sending...";
    statusEl.textContent = "";

    try {
      await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_REPLY_TEMPLATE_ID, {
        to_email: m.reply_to,
        from_name: m.from_name,
        reply_text: `Your project is complete! Here's the remaining payment to close it out.`,
        payment_section: paymentSection
      });

      const { error } = await supabaseClient
        .from('messages')
        .update({ final_payment_sent: true })
        .eq('id', id);
      if (error) throw error;

      m.final_payment_sent = true;
      statusEl.textContent = 'Sent ✓';
      setTimeout(()=>{ openMessage(id); }, 500);
    } catch(err) {
      console.error('Payment request error:', err);
      statusEl.textContent = 'Failed — try again';
      btn.disabled = false;
      btn.textContent = "Send remaining payment request →";
    }
  }
</script>
</body>
</html>
